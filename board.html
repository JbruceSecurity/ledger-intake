<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Officer Board</title>
  <style>
    body { font-family: -apple-system, system-ui, Arial; padding: 14px; max-width: 1100px; margin: 0 auto; }
    h1 { margin: 0 0 10px; }
    .muted { color:#666; font-size: 13px; }
    input, button { font-size: 18px; padding: 12px; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; }
    .row { display:flex; gap:10px; margin-top:10px; flex-wrap: wrap; }
    .row > * { flex:1; min-width: 160px; }
    table { width:100%; border-collapse: collapse; margin-top:12px; }
    th, td { border:1px solid #ddd; padding:8px; font-size:14px; vertical-align: top; }
    th { background:#f5f5f5; text-align:left; }
    .msg { margin: 10px 0; font-weight: 800; }
    .hidden { display:none; }
    .dangerText { color:#b00020; font-weight: 900; font-size: 18px; }
    .okText { color:#0b6b2a; font-weight: 900; }
  </style>
</head>
<body>
  <h1>Officer Board</h1>
  <div class="muted">
    Search PO or scan BOL → confirm Door + Dept → tap <b>Check In</b>.
  </div>

  <p class="msg" id="msg"></p>

  <label style="display:block; margin-top:10px;">Search PO</label>
  <input id="searchPO" maxlength="5" inputmode="numeric" placeholder="Type PO digits…" />

  <div class="row">
    <button id="scanBolBtn">Scan BOL (auto-find PO)</button>
    <button id="refreshBtn">Refresh</button>
    <button id="clearSearchBtn" type="button">Clear Search</button>
  </div>

  <!-- Hidden camera/file input -->
  <input id="bolFile" class="hidden" type="file" accept="image/*" capture="environment" />

  <div id="tableWrap"></div>

  <!-- OCR library -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pxiigthkswhnivanndfn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_fWVXeZM0mcylqczc6DWztA_Fu63kfj0";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const msg = document.getElementById("msg");
    const tableWrap = document.getElementById("tableWrap");
    const refreshBtn = document.getElementById("refreshBtn");
    const searchPO = document.getElementById("searchPO");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const scanBolBtn = document.getElementById("scanBolBtn");
    const bolFile = document.getElementById("bolFile");

    let lastRows = [];

    function defaultDoorForDept(dept){
      if (dept === "Grocery") return "56";
      if (dept === "Produce/Dairy") return "93";
      if (dept === "Meat/Frozen") return "132";
      return "";
    }

    // Door to DISPLAY (actual door to use):
    // - if ledger door exists, use it
    // - else default door by dept
    function doorToUse(r){
      return (r.ledger_door || "").trim() || defaultDoorForDept(r.department);
    }

    function render(rows){
      const q = (searchPO.value || "").trim();
      const view = q ? rows.filter(r => String(r.po_number || "").includes(q)) : rows;

      if (!view.length){
        tableWrap.innerHTML = "<p class='muted'>No matching Queue POs.</p>";
        return;
      }

      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>PO</th>
              <th>Door</th>
              <th>Department</th>
              <th>Check In</th>
            </tr>
          </thead>
          <tbody>
            ${view.map(r => {
              const door = doorToUse(r) || "—";
              return `
                <tr>
                  <td><b>${r.po_number || ""}</b></td>
                  <td><b>${door}</b></td>
                  <td>${r.department || ""}</td>
                  <td>
                    <button data-checkin="${r.id}">Check In</button>
                  </td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    async function loadQueueRows(){
      msg.textContent = "Loading…";
      const { data, error } = await supabase
        .from("trucks")
        .select("*")
        .eq("archived", false)
        .eq("status", "Queue")
        .order("last_updated", { ascending: false });

      if (error){
        msg.textContent = `Load error: ${error.message}`;
        return;
      }

      lastRows = data || [];
      msg.textContent = "";
      render(lastRows);
    }

    refreshBtn.addEventListener("click", loadQueueRows);
    searchPO.addEventListener("input", () => render(lastRows));
    clearSearchBtn.addEventListener("click", () => { searchPO.value = ""; render(lastRows); });

    // ----- BOL Scan: whole page, guess from Queue POs only -----
    scanBolBtn.addEventListener("click", () => {
      msg.textContent = "Open camera / select full BOL photo…";
      bolFile.value = "";
      bolFile.click();
    });

    function extractFiveDigitCandidatesWithContext(text) {
      const normalized = (text || "").replace(/\r/g, "\n");
      const re = /\b(\d{5})\b/g;
      const hits = [];
      let m;
      while ((m = re.exec(normalized)) !== null) {
        hits.push({ po: m[1], idx: m.index });
      }
      return { normalized, hits };
    }

    function scoreByPOKeywordsAround(normalizedText, idx) {
      const windowSize = 90;
      const start = Math.max(0, idx - windowSize);
      const end = Math.min(normalizedText.length, idx + 5 + windowSize);
      const ctx = normalizedText.slice(start, end).toLowerCase().replace(/\s+/g, " ");

      let score = 0;

      // Strong PO patterns
      if (ctx.match(/(po|p\.o\.|purchase order|customer po|cust po)[^0-9]{0,12}\d{5}/)) score += 15;

      const strong = ["po#", "po #", "p.o.", "p.o", "purchase order", "customer po", "cust po", "po number", "po no"];
      for (const s of strong) if (ctx.includes(s)) score += 8;

      // Mild hint
      if (ctx.includes(" po ")) score += 3;

      // Penalties for address-ish context
      const negatives = ["zip", "zipcode", "address", "st ", "ave", "rd ", "blvd", "suite", "phone", "tel"];
      for (const n of negatives) if (ctx.includes(n)) score -= 4;

      return score;
    }

    function chooseBestPOFromOCR(ocrText, queueRows) {
      const queueSet = new Set(queueRows.map(r => String(r.po_number || "")));
      const { normalized, hits } = extractFiveDigitCandidatesWithContext(ocrText);

      const scored = [];
      for (const h of hits) {
        if (!queueSet.has(h.po)) continue; // must exist in Queue
        scored.push({ po: h.po, score: scoreByPOKeywordsAround(normalized, h.idx) });
      }
      if (!scored.length) return null;

      // keep best score per PO
      const bestByPO = new Map();
      for (const s of scored) {
        const prev = bestByPO.get(s.po);
        if (!prev || s.score > prev.score) bestByPO.set(s.po, s);
      }
      const ranked = Array.from(bestByPO.values()).sort((a,b) => b.score - a.score);
      return ranked[0]?.po || null;
    }

    bolFile.addEventListener("change", async () => {
      const file = bolFile.files?.[0];
      if (!file) return;

      try {
        msg.textContent = "Scanning full BOL…";
        const imgUrl = URL.createObjectURL(file);

        const result = await Tesseract.recognize(imgUrl, "eng", {
          logger: (m) => {
            if (m?.status === "recognizing text" && typeof m.progress === "number") {
              msg.textContent = `Scanning full BOL… ${Math.round(m.progress * 100)}%`;
            }
          }
        });

        URL.revokeObjectURL(imgUrl);

        const text = (result?.data?.text || "");
        const best = chooseBestPOFromOCR(text, lastRows);

        if (best) {
          searchPO.value = best;
          render(lastRows);
          msg.innerHTML = `<span class="okText">Guessed PO ${best} (from Queue).</span>`;
        } else {
          msg.innerHTML = `<span class="dangerText">NO QUEUE PO FOUND ON BOL — Try a clearer photo.</span>`;
        }

      } catch (err) {
        msg.innerHTML = `<span class="dangerText">BOL scan failed: ${err?.message || err}</span>`;
      }
    });

    // ----- Check In -----
    tableWrap.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const checkId = btn.getAttribute("data-checkin");
      if (!checkId) return;

      msg.textContent = "Saving…";
      const { error } = await supabase
        .from("trucks")
        .update({ status: "Checked In", last_updated: new Date().toISOString() })
        .eq("id", checkId);

      if (error) {
        msg.textContent = `Save error: ${error.message}`;
        return;
      }

      msg.textContent = "Checked in.";
      await loadQueueRows();
    });

    loadQueueRows();
    setInterval(loadQueueRows, 20000);
  </script>
</body>
</html>
