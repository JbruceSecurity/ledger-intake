<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ledger Intake (Admin)</title>
  <style>
    body { font-family: -apple-system, system-ui, Arial; padding: 14px; max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0 0 10px; }
    .muted { color:#666; font-size: 13px; }
    .tabs { display:flex; gap:8px; margin:12px 0; flex-wrap: wrap; }
    .tab {
      padding:10px 14px;
      border:1px solid #ddd;
      border-radius:999px;
      cursor:pointer;
      background:#f7f7f7;
      font-weight:700;
      user-select: none;
    }
    .tab.active { background:#111; color:#fff; border-color:#111; }
    label { display:block; font-size:14px; margin:10px 0 6px; }
    input, button { width:100%; font-size:16px; padding:10px; box-sizing: border-box; }
    button { cursor:pointer; }
    table { width:100%; border-collapse: collapse; margin-top:14px; }
    th, td { border:1px solid #ddd; padding:8px; font-size:14px; vertical-align: top; }
    th { background:#f5f5f5; text-align:left; }
    .msg { margin:10px 0; font-weight:800; }
    .pill { padding:3px 8px; border-radius:999px; border:1px solid #ddd; font-size:12px; display:inline-block; }
    .topline { display:flex; gap:12px; align-items: baseline; flex-wrap: wrap; }
    .topline .right { margin-left:auto; }
    .mini { font-size:12px; }
  </style>
</head>
<body>

<div class="topline">
  <div>
    <h1 style="margin:0;">Ledger Intake (Admin)</h1>
    <div class="muted">
      Each tab matches a warehouse ledger page.  
      Type PO → press <b>Enter</b> → repeat.
    </div>
  </div>
  <div class="right muted mini">
    Officer link: <a href="./board.html" target="_blank">board.html</a>
  </div>
</div>

<!-- Department Tabs -->
<div class="tabs" id="tabs">
  <div class="tab active" data-dept="Grocery">Grocery</div>
  <div class="tab" data-dept="Produce/Dairy">Produce / Dairy</div>
  <div class="tab" data-dept="Meat/Frozen">Meat / Frozen</div>
</div>

<p class="msg" id="msg"></p>

<!-- Entry Form -->
<form id="form" autocomplete="off">
  <label>PO Number (5 digits)</label>
  <input id="po" maxlength="5" inputmode="numeric" placeholder="12345" required />

  <label>Ledger Door (optional)</label>
  <input id="ledgerDoor" placeholder="e.g. 12 (leave blank if none)" />

  <button type="submit">Add PO to Ledger</button>
</form>

<!-- Current dept ledger table -->
<div id="tableWrap"></div>
