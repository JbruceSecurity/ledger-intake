<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ledger Intake (Admin)</title>
  <style>
    body { font-family: -apple-system, system-ui, Arial; padding: 14px; max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0 0 10px; }
    .muted { color:#666; font-size: 13px; }
    .tabs { display:flex; gap:8px; margin:12px 0; }
    .tab {
      padding:10px 14px;
      border:1px solid #ddd;
      border-radius:999px;
      cursor:pointer;
      background:#f7f7f7;
      font-weight:600;
    }
    .tab.active { background:#111; color:#fff; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    label { display:block; font-size:14px; margin:10px 0 6px; }
    input, button { width:100%; font-size:16px; padding:10px; }
    button { cursor:pointer; }
    table { width:100%; border-collapse: collapse; margin-top:14px; }
    th, td { border:1px solid #ddd; padding:8px; font-size:14px; }
    th { background:#f5f5f5; }
    .msg { margin:10px 0; font-weight:700; }
    .pill { padding:3px 8px; border-radius:999px; border:1px solid #ddd; font-size:12px; }
  </style>
</head>
<body>

<h1>Ledger Intake (Admin)</h1>
<div class="muted">
  Each tab represents a warehouse ledger page.  
  Add multiple POs quickly — all entries are saved directly to the ledger.
</div>

<!-- Department Tabs -->
<div class="tabs">
  <div class="tab active" data-dept="Grocery">Grocery</div>
  <div class="tab" data-dept="Produce/Dairy">Produce / Dairy</div>
  <div class="tab" data-dept="Meat/Frozen">Meat / Frozen</div>
</div>

<p class="msg" id="msg"></p>

<!-- Entry Form -->
<form id="form">
  <label>PO Number (5 digits)</label>
  <input id="po" maxlength="5" inputmode="numeric" placeholder="12345" required />

  <div class="row">
    <div>
      <label>Ledger Door (optional)</label>
      <input id="ledgerDoor" placeholder="e.g. 12 (leave blank if none)" />
    </div>
  </div>

  <button type="submit">Add PO to Ledger</button>
</form>

<!-- Ledger Table -->
<div id="tableWrap"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://pxiigthkswhnivanndfn.supabase.co";
const SUPABASE_KEY = "sb_publishable_fWVXeZM0mcylqczc6DWztA_Fu63kfj0";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.getElementById("form");
const msg = document.getElementById("msg");
const tableWrap = document.getElementById("tableWrap");
const po = document.getElementById("po");
const carrier = document.getElementById("carrier");
const ledgerDoor = document.getElementById("ledgerDoor");

let currentDept = "Grocery";
let rows = [];

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentDept = tab.dataset.dept;
    loadRows();
  });
});

function defaultDoor(dept) {
  if (dept === "Grocery") return "56";
  if (dept === "Produce/Dairy") return "93";
  if (dept === "Meat/Frozen") return "132";
  return "";
}

function instructionText(r) {
  if (r.ledger_door) {
    return `Back in to Door ${r.ledger_door}`;
  }
  return `Walk through → Door ${defaultDoor(r.department)}`;
}

function render() {
  if (!rows.length) {
    tableWrap.innerHTML = "<p class='muted'>No POs added yet.</p>";
    return;
  }

  tableWrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>PO</th>
          <th>Carrier</th>
          <th>Instruction</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td><b>${r.po_number}</b></td>
            <td>${r.carrier || ""}</td>
            <td>${instructionText(r)}</td>
            <td><span class="pill">${r.status}</span></td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

async function loadRows() {
  msg.textContent = "Loading…";
  const { data, error } = await supabase
    .from("trucks")
    .select("*")
    .eq("department", currentDept)
    .eq("archived", false)
    .order("last_updated", { ascending: false });

  if (error) {
    msg.textContent = error.message;
    return;
  }

  rows = data || [];
  msg.textContent = "";
  render();
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.textContent = "";

  if (!/^\d{5}$/.test(po.value.trim())) {
    msg.textContent = "PO must be exactly 5 digits.";
    return;
  }

  const payload = {
    po_number: po.value.trim(),
    carrier: carrier.value.trim() || null,
    ledger_door: ledgerDoor.value.trim() || null,
    department: currentDept,
    status: "Queue",
    archived: false,
    last_updated: new Date().toISOString()
  };

  const { error } = await supabase.from("trucks").insert([payload]);
  if (error) {
    msg.textContent = error.message;
    return;
  }

  po.value = "";
  carrier.value = "";
  ledgerDoor.value = "";
  msg.textContent = "PO added.";
  await loadRows();
});

loadRows();
</script>

</body>
</html>
